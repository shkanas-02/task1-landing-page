<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Landing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">BrandX</div>

    <!-- Hamburger -->
    <div class="hamburger" id="hamburger">
      ☰
    </div>

    <nav class="nav" id="nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-text">
      <h1>Grow Your Brand Digitally</h1>
      <p>We help businesses scale with modern web solutions.</p>
      <button>Get Started</button>
    </div>

    <div class="hero-img">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" alt="team">
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
        <p>© 2026 BrandX</p>
        <div class="social">
            <a href="#">Instagram</a>
            <a href="#">LinkedIn</a>
            <a href="#">Twitter</a>
        </div>
    </footer>

  <script>
    const hamburger = document.getElementById("hamburger");
    const nav = document.getElementById("nav");

    hamburger.addEventListener("click", () => {
      nav.classList.toggle("active");
    });
  </script>

</body>
</html>
